name: Google Photos Library
description: >-
  The Google Photos Library API allows you to manage photos, videos, and albums in Google Photos. You can create and
  manage albums, upload and retrieve media items, search through your photo library, and share albums with other users.
  The API uses OAuth 2.0 for authentication and requires a Google account.
